server {
    server_name jookoi.com www.jookoi.com;
    root /var/www/html/jookoi.com;
    index index.html;

    location = /test {
        return 301 /test/;
    }

    location /test/api/ {
        proxy_pass http://127.0.0.1:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /test/ {
        alias /var/www/html/jookoi.com/test/;
        try_files $uri $uri/ /test/index.html;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/jookoi.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/jookoi.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.jookoi.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = jookoi.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name jookoi.com www.jookoi.com;
    return 404; # managed by Certbot
}
